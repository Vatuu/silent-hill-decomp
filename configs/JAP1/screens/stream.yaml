name: Video stream logic overlay (STREAM)
sha1: 1230ed958342a6b1dd94a245e3664093c2da32f3
options:
  basename: STREAM.BIN
  target_path: assets/JAP1/VIN/STREAM.BIN
  base_path: ../../..
  platform: psx
  compiler: GCC

  asm_path: asm/JAP1/screens/stream
  src_path: src/screens/stream
  asset_path: asm/JAP1/screens/stream
  build_path: build/JAP1

  ld_script_path: linkers/JAP1/screens/stream.ld

  find_file_boundaries: False
  gp_value: 0x80022BB0
  global_vram_start: 0x80010000
  global_vram_end: 0x80200000

  o_as_suffix: False
  use_legacy_include_asm: False

  asm_function_macro: glabel
  asm_jtbl_label_macro: jlabel
  asm_data_macro: dlabel

  section_order: [".rodata", ".text", ".data", ".bss"]

  symbol_addrs_path:
    - configs/JAP1/screens/sym.stream.txt
    - configs/JAP1/sym.bodyprog.txt
    - configs/USA/sym.main.txt
  reloc_addrs_path:
    - configs/JAP1/screens/rel.stream.txt

  undefined_funcs_auto_path: linkers/JAP1/screens/undefined_funcs_auto.stream.txt
  undefined_syms_auto_path: linkers/JAP1/screens/undefined_syms_auto.stream.txt

  extensions_path: tools/splat_ext

  subalign: 4

  string_encoding: ASCII
  data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2
segments:
  - name: stream
    type: code
    start: 0
    vram: 0x801E2600
    align: 4
    subalign: 4
    subsegments:
      # .rodata section
      - [0x0, rodata]
      - [0x4, o, ../../lib/libpress/libpress, .rdata]

      # .text section
      - [0x54, c, stream]
      - [0xF18, o, ../../lib/libds/dscb]
      - [0xF78, o, ../../lib/libpress/libpress]
      - [0x1608, o, ../../lib/libpress/vlc]

      # .data section
      - [0x1988, .data, stream]
      - [0x19A8, o, ../../lib/libpress/libpress, .data]
      - [0x1AF8, o, ../../lib/libpress/vlc, .data]
      - [0x1B28, o, ../../lib/libpress/table, .data]

      # .bss section
      - [0x12B28, .bss, stream]
      - [0x12B2C, pad] # Garbage
      - [0x12B30, o, ../../lib/libds/dscb, .bss]

  # Random garbage data at end, overlaps into .bss causing issues, define as seperate segment
  - name: footer_data
    type: bin
    start: 0x12B3C
  
  - [0x12C00]