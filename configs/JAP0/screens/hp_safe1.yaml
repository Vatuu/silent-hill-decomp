name: Anti-modchip overlay 2 (HP_SAFE1)
sha1: 456EBB49C85F1466453348AC7D5F8ACCAA9DE628
options:
  basename: HP_SAFE1.BIN
  target_path: assets/JAP0/BG/HP_SAFE1.BIN
  base_path: ../../..
  platform: psx
  compiler: GCC

  asm_path: asm/JAP0/screens/hp_safe1
  src_path: src/screens/hp_safe1
  asset_path: asm/JAP0/screens/hp_safe1
  build_path: build/JAP0

  ld_script_path: linkers/JAP0/screens/hp_safe1.ld

  find_file_boundaries: False
  gp_value: 0x80022BB0
  global_vram_start: 0x80010000
  global_vram_end: 0x80200000

  o_as_suffix: False
  use_legacy_include_asm: False

  asm_function_macro: glabel
  asm_jtbl_label_macro: jlabel
  asm_data_macro: dlabel
  generate_asm_macros_files: False # Disabled as our include_asm.h is customized to work with different game versions.

  section_order: [".rodata", ".text", ".data", ".bss"]

  symbol_addrs_path:
    - configs/JAP0/screens/sym.hp_safe1.txt
    - configs/JAP0/sym.bodyprog.txt
    - configs/USA/sym.main.txt
  reloc_addrs_path:
    - configs/JAP0/screens/rel.hp_safe1.txt

  undefined_funcs_auto_path: linkers/JAP0/screens/undefined_funcs_auto.hp_safe1.txt
  undefined_syms_auto_path: linkers/JAP0/screens/undefined_syms_auto.hp_safe1.txt

  subalign: 4

  string_encoding: ASCII
  data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2
segments:
  - name: hp_safe1
    type: code
    start: 0
    vram: 0x801E7600
    align: 4
    subalign: 4
    subsegments:
      # .rodata section
      - [0x0, rodata, safechk]

      # .text section
      - [0x54, asm, safechk] # safechk.obj v1.0.0.0, only used in S__SAFE2, included but unused here.
      - [0x8B4, c, hp_safe1]

      # .data section
      - [0x904, data, safechk]
  - [0x994]
