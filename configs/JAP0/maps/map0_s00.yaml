name: The MAP0_S00 map overlay (MAP0_S00)
sha1: f37c004f09cd085b62a27c0f68b9bd9f7aa527c1
options:
  basename: MAP0_S00.BIN
  target_path: assets/JAP0/VIN/MAP0_S00.BIN
  base_path: ../../..
  platform: psx
  compiler: GCC

  asm_path: asm/JAP0/maps/map0_s00
  src_path: src/maps/map0_s00
  build_path: build/JAP0

  ld_script_path: linkers/JAP0/maps/map0_s00.ld

  find_file_boundaries: False
  gp_value: 0x80022BB0
  global_vram_start: 0x80010000
  global_vram_end: 0x80200000

  o_as_suffix: False
  use_legacy_include_asm: False

  asm_function_macro: glabel
  asm_jtbl_label_macro: jlabel
  asm_data_macro: dlabel

  section_order: [".rodata", ".text", ".data", ".bss"]

  symbol_addrs_path:
    - configs/JAP0/maps/sym.map0_s00.txt
    - configs/JAP0/sym.bodyprog.txt
    - configs/USA/sym.main.txt
  reloc_addrs_path:
    - configs/JAP0/maps/rel.map0_s00.txt

  undefined_funcs_auto_path: linkers/JAP0/maps/undefined_funcs_auto.map0_s00.txt
  undefined_syms_auto_path: linkers/JAP0/maps/undefined_syms_auto.map0_s00.txt

  extensions_path: tools/splat_ext

  subalign: 4

  string_encoding: ASCII
  data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2
segments:
  - name: map0_s00
    type: code
    start: 0
    vram: 0x800CBAA8
    align: 4
    subalign: 4
    subsegments:
      # .rodata section
      - [0x0, rodata]
      - [0x4, .rodata, map0_s00_header]
      - [0x1050, .rodata, map0_s00]
      - [0x18C8, .rodata, Chara_Cheryl]
      - [0x18DC, rodata]
      - [0x18E0, .rodata, map0_s00_2]

      # Data only C files
      - [0x20F8, c, map0_s00_header]
      #- [0x20F8, c, map0_s00_events_data] # Could this be merge with `map0_s00_events`? (That file should contain strings and functions of events just like map0_s01 counterpart)
      - [0x20F8, c, map0_s00_anim_info]
      
      # .text section
      - [0x20F8, c, map0_s00]
      - [0xEA00, c, Chara_Cheryl]
      - [0xF2F4, c, map0_s00_2]

      # .data section
      - [0x13D04, .data, map0_s00_anim_info]
      - [0x13FCC, data]
      - [0x15D58, .data, map0_s00_header]
      - [0x16100, .data, map0_s00_2]
      - [0x16198, data, map0_s00_events_data] # Some events are different to USA? TODO: Run bin2c and compare.
      - [0x164F8, data]
  - [0x1A500]
